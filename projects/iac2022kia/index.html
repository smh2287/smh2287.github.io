<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAC 2022 KIA – Project Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--accent:#1FFFE0;--bg:#1F2121;--card-bg:#2a2d2d;--text:#EBF2F4}
    body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .wrap.locked .content{filter:blur(8px);pointer-events:none;user-select:none}
    .header{text-align:center;padding:60px 20px 32px}
    .header .pre{font-size:14px;letter-spacing:3px;color:var(--accent)}
    .header h1{font-size:30px;font-weight:300;letter-spacing:2px;margin-top:10px}
    .header h1 b{font-weight:700;color:var(--accent)}
    .grid{max-width:980px;margin:0 auto;padding:20px 24px 70px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
    .card{display:block;text-decoration:none;color:var(--text);background:var(--card-bg);border-radius:8px;padding:18px;transition:.2s}
    .card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(31,255,224,.15)}
    .card .t{font-size:14px;font-weight:700;letter-spacing:.5px}
    .card .m{margin-top:8px;color:#95a0a0;font-size:12px}
    .card.disabled{opacity:.55;pointer-events:none}

    .gate{position:fixed;inset:0;background:rgba(12,13,13,.72);display:flex;align-items:center;justify-content:center;z-index:9999}
    .panel{width:min(420px,90vw);background:#202323;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px}
    .panel h2{font-size:20px;font-weight:300;margin-bottom:8px}
    .panel p{font-size:12px;color:#9aa6a6;margin-bottom:16px}
    .row{display:flex;gap:8px}
    input{flex:1;background:#111313;border:1px solid #3b4444;color:#fff;padding:12px;border-radius:8px;font-size:16px;letter-spacing:2px}
    button{background:var(--accent);color:#0f1313;border:none;border-radius:8px;padding:0 16px;font-weight:700;cursor:pointer}
    .err{margin-top:10px;font-size:12px;color:#ff7f7f;min-height:16px}
  </style>
</head>
<body>
  <div id="app" class="wrap locked">
    <div class="content">
      <div class="header">
        <div class="pre">IAC 2022 KIA</div>
        <h1><b>PROJECT</b> HUB</h1>
      </div>
      <div class="grid">
        <a class="card" href="mocamper/"><div class="t">MOCAMPER</div><div class="m">Live</div></a>
        <a class="card disabled" href="#"><div class="t">MOVILLA</div><div class="m">Coming soon</div></a>
        <a class="card disabled" href="#"><div class="t">EGONEST</div><div class="m">Coming soon</div></a>
        <a class="card disabled" href="#"><div class="t">ALLROUND SHIPPER</div><div class="m">Coming soon</div></a>
        <a class="card disabled" href="#"><div class="t">ENVIRONMENTS</div><div class="m">Coming soon</div></a>
        <a class="card disabled" href="#"><div class="t">GLOBE ORBITER</div><div class="m">Coming soon</div></a>
      </div>
    </div>
  </div>

  <div id="gate" class="gate" role="dialog" aria-modal="true">
    <div class="panel">
      <h2>Access Required</h2>
      <p>Password를 입력하면 프로젝트 허브가 열립니다.</p>
      <div class="row">
        <input id="pwd" type="password" maxlength="4" placeholder="password" autocomplete="off" />
        <button id="ok">확인</button>
      </div>
      <div id="err" class="err"></div>
    </div>
  </div>

  <script>
    const KEY='authed_iac2022kia';
    const PASS_SHA256='4ea837ac2e51fbac23f73aff0a9dd25089f67d3e4b1b5355219dc8f254f4653d';
    const app=document.getElementById('app');
    const gate=document.getElementById('gate');
    const pwd=document.getElementById('pwd');
    const err=document.getElementById('err');
    function unlock(){sessionStorage.setItem(KEY,'1');app.classList.remove('locked');gate.style.display='none'}
    async function sha256(s){const b=new TextEncoder().encode(s);const d=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(d)).map(v=>v.toString(16).padStart(2,'0')).join('');}
    async function check(){const h=await sha256(pwd.value);if(h===PASS_SHA256){unlock()}else{err.textContent='비밀번호가 올바르지 않습니다.';pwd.value='';pwd.focus();}}
    if(sessionStorage.getItem(KEY)==='1'){unlock()} else {pwd.focus()}
    document.getElementById('ok').addEventListener('click',check);
    pwd.addEventListener('keydown',e=>{if(e.key==='Enter')check()});
  </script>
</body>
</html>
