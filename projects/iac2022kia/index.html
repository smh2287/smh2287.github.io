<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAC 2022 KIA – Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root {
      --accent:#1FFFE0; --bg:#1F1F21; --text:#EBF2F4; --fade:1000ms;
      --intro-img:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/index/01IAC22K-00-01%20_%20Intro.webp');
      --ending-img:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/index/01IAC22K-13RV-01%20_%20Review.webp');
    }
    html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;overflow:hidden}
    .swiper{width:100%;height:100%}
    .swiper-slide{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg)}

    /* no-crop backgrounds */
    .bg{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center;filter:brightness(.9)}
    .bg.intro{background-image:var(--intro-img)}
    .bg.ending{background-image:var(--ending-img)}

    .overlay{position:absolute;inset:0;background:rgba(0,0,0,.28)}

    .top-left{position:fixed;left:20px;top:20px;z-index:10010;display:flex;align-items:center;gap:12px}
    .menu-btn{width:42px;height:42px;border:1px solid rgba(255,255,255,.12);background:rgba(18,20,22,.7);color:#fff;display:grid;place-items:center;cursor:pointer}
    .menu-btn:hover{border-color:var(--accent)}
    .hamburger{width:18px;height:14px;position:relative}
    .hamburger i{position:absolute;left:0;right:0;height:2px;background:#fff}
    .hamburger i:nth-child(1){top:0}.hamburger i:nth-child(2){top:6px}.hamburger i:nth-child(3){top:12px}
    .brand{letter-spacing:2px;font-size:12px;opacity:.85;color:var(--text);text-decoration:none}

    .wall-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.42);opacity:0;pointer-events:none;transition:.28s;z-index:10020}
    .wall{position:fixed;left:0;top:0;bottom:0;width:min(420px,88vw);background:#16191c;border-right:1px solid rgba(255,255,255,.12);transform:translateX(-102%);transition:.32s;z-index:10030;padding:26px 22px;overflow:auto}
    body.wall-open .wall{transform:translateX(0)}
    body.wall-open .wall-backdrop{opacity:1;pointer-events:auto}
    .wall h2{font-size:14px;letter-spacing:2px;color:var(--accent);margin-bottom:18px}
    .project-links{display:flex;flex-direction:column;gap:10px}
    .project-links a{display:block;text-decoration:none;color:#d9e2e6;border:1px solid rgba(255,255,255,.18);padding:12px 12px;font-size:13px;letter-spacing:.6px;background:transparent}
    .project-links a:hover,.project-links a.current{border-color:var(--accent);color:#fff}

    /* slide 2 grid */
    .grid-wrap{position:relative;z-index:2;width:min(1260px,96vw);height:min(86vh,980px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .list-slide{overflow:hidden}
    .grid-title{margin-bottom:18px;text-align:center}
    .grid-title h1{font-size:26px;font-weight:300;letter-spacing:2px}
    .grid-title h1 b{font-weight:700;color:var(--accent)}
    .grid{width:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));grid-auto-rows:120px;gap:12px}
    .tile{position:relative;display:block;height:100%;border-radius:10px;overflow:hidden;text-decoration:none;color:#fff;background:#222;border:1px solid rgba(255,255,255,.08);pointer-events:auto}
    .tile.main{grid-column:span 2;grid-row:span 2}
    .tile .thumb{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.02);filter:brightness(.78)}
    .tile .shade{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%, rgba(0,0,0,.68) 100%)}
    .tile .meta{position:relative;z-index:2;height:100%;padding:12px;display:flex;align-items:flex-end}
    .tile .name{font-size:13px;font-weight:700;letter-spacing:.3px}
    .tile.main .name{font-size:18px;letter-spacing:1px}
    .tile:hover{outline:1px solid rgba(31,255,224,.65);transform:translateY(-1px)}

    /* lock screen (mocamper-like) */
    #password-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity var(--fade) ease-in-out}
    #password-screen::before{content:'';position:absolute;inset:-40px;background-image:var(--intro-img);background-size:cover;background-position:center;filter:blur(24px);transform:scale(1.08)}
    #password-screen::after{content:'';position:absolute;inset:0;background:rgba(31,33,33,.78)}
    .password-container{position:relative;z-index:2;text-align:center;padding:40px;width:100%}
    .password-container .pre-title{color:var(--text);font-size:17px;letter-spacing:2px;margin-bottom:14px}
    .password-container h2{font-size:30px;font-weight:300;letter-spacing:2px;margin-bottom:30px}
    .password-container h2 b{font-weight:700;color:var(--accent)}
    #password-input{width:300px;padding:15px 20px;font-size:16px;border:none;background:var(--text);color:var(--bg);outline:none;text-align:center;letter-spacing:3px}
    #password-input::placeholder{color:#1F2F21;opacity:.6}
    #submit-btn{display:none}
    #error-message{color:#ff6445;margin-top:15px;font-size:14px;min-height:20px}
    @keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-10px)}20%,40%,60%,80%{transform:translateX(10px)}}

    .scroll-hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:20;color:#e8f3f3;font-size:12px;letter-spacing:2px;opacity:.72;pointer-events:none}
    @media (max-width: 640px) {
      .top-left{left:14px;top:14px;gap:10px}
      .brand{font-size:11px;letter-spacing:1.4px}
      .wall{width:min(360px,88vw);padding:22px 18px}
      .list-slide .grid-wrap{width:100%;height:100%;padding:84px 14px 30px;justify-content:flex-start;align-items:stretch;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
      .grid-title{margin-bottom:14px}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr));grid-auto-rows:104px;gap:10px}
      .tile.main{grid-column:span 2;grid-row:span 2}
      .tile .name{font-size:12px}
      .tile.main .name{font-size:16px}
      #password-input{width:84vw;max-width:320px}
    }
  </style>
</head>
<body>
  <div id="password-screen">
    <div class="password-container">
      <div class="pre-title">IAC 2022 KIA</div>
      <h2><b>PROJECT</b> INDEX</h2>
      <input type="password" id="password-input" placeholder="password" autocomplete="off" maxlength="4">
      <br><button id="submit-btn">확인</button>
      <div id="error-message"></div>
    </div>
  </div>


  <div class="top-left">
    <button class="menu-btn" id="openWall" aria-label="open menu" aria-expanded="false">
      <span class="hamburger"><i></i><i></i><i></i></span>
    </button>
    <a class="brand" href="/">MINHO SONG / PORTFOLIO</a>
  </div>

  <div class="wall-backdrop" id="wallBackdrop"></div>
  <aside class="wall" id="wall">
    <h2>PROJECTS</h2>
    <nav class="project-links">
      <a href="/projects/iac2022kia/index.html">KIA X K'arts _ IAC 2022</a>
      <a href="/projects/iac2022hyundai/index.html">HYUNDAI X K'arts _ IAC 2022</a>
      <a href="/projects/iac2021kia/index.html">KIA X K'arts _ IAC 2021</a>
      <a href="/projects/vishow/index.html">VISHOW</a>
      <a href="/projects/niva/index.html">NIVA</a>
    </nav>
  </aside>

  <div class="swiper" id="index-swiper">
    <div class="swiper-wrapper">
      <!-- 1. Intro image only -->
      <section class="swiper-slide">
        <div class="bg intro"></div><div class="overlay"></div>
      </section>

      <!-- 2. Project Tiles on black -->
      <section class="swiper-slide list-slide" style="background:#1F1F21;">
        <div class="grid-wrap">
          <div class="grid-title"><h1><b>PROJECT</b> LIST</h1></div>
          <div class="grid">
            <a class="tile main" href="mocamper/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/mocamper.webp')"></div><div class="shade"></div><div class="meta"><div class="name">MOCAMPER</div></div></a>
            <a class="tile main" href="movilla/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/movilla.webp')"></div><div class="shade"></div><div class="meta"><div class="name">MOVILLA</div></div></a>
            <a class="tile main" href="egonest/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/egonest.webp')"></div><div class="shade"></div><div class="meta"><div class="name">EGONEST</div></div></a>
            <a class="tile" href="allroundshipper/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/allroundshipper.webp')"></div><div class="shade"></div><div class="meta"><div class="name">ALLROUND SHIPPER</div></div></a>
            <a class="tile" href="tess/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/tess.webp')"></div><div class="shade"></div><div class="meta"><div class="name">TESS</div></div></a>
            <a class="tile" href="globeorbiter/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/globeorbiter.webp')"></div><div class="shade"></div><div class="meta"><div class="name">GLOBE ORBITER</div></div></a>
            <a class="tile" href="manimo/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/manimo.webp')"></div><div class="shade"></div><div class="meta"><div class="name">MANIMO</div></div></a>
            <a class="tile" href="tessaplate/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/tessaplate.webp')"></div><div class="shade"></div><div class="meta"><div class="name">TESSA PLATE</div></div></a>
            <a class="tile" href="tessacube/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/tessacube.webp')"></div><div class="shade"></div><div class="meta"><div class="name">TESSA CUBE</div></div></a>
            <a class="tile" href="mdeklogo/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/mdeklogo.webp')"></div><div class="shade"></div><div class="meta"><div class="name">MDEK LOGO</div></div></a>
            <a class="tile" href="environments/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/environments.webp')"></div><div class="shade"></div><div class="meta"><div class="name">ENVIRONMENTS</div></div></a>
            <a class="tile" href="mdekvr/?v=20260303"><div class="thumb" style="background-image:url('https://songfamhome.synology.me/portfolio/images/iac2022kia/thumbs/mdekvr.webp')"></div><div class="shade"></div><div class="meta"><div class="name">MDEK VR</div></div></a>
          </div>
        </div>
      </section>

      <!-- 3. Ending image only -->
      <section class="swiper-slide">
        <div class="bg ending"></div><div class="overlay"></div>
      </section>
    </div>
  </div>

  <div class="scroll-hint">SCROLL</div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const KEY='authed_iac2022kia';
    const PASS_SHA256='4ea837ac2e51fbac23f73aff0a9dd25089f67d3e4b1b5355219dc8f254f4653d';
    const passwordScreen=document.getElementById('password-screen');
    const passwordInput=document.getElementById('password-input');
    const errorMessage=document.getElementById('error-message');

    const swiper=new Swiper('#index-swiper',{
      direction:'vertical', slidesPerView:1, speed:620, mousewheel:true,
      keyboard:{enabled:true},
      nested:true,
      touchStartPreventDefault:false,
      touchReleaseOnEdges:true,
      threshold:6,
    });

    async function sha256(s){
      const b=new TextEncoder().encode(s);
      const d=await crypto.subtle.digest('SHA-256',b);
      return Array.from(new Uint8Array(d)).map(v=>v.toString(16).padStart(2,'0')).join('');
    }
    function unlock(isInstant=false){
      sessionStorage.setItem(KEY,'1');
      if(isInstant){passwordScreen.style.display='none';}
      else{passwordScreen.style.opacity='0';setTimeout(()=>passwordScreen.style.display='none',1000)}
    }
    let wrongCount=0;
    async function checkPassword(){
      const h=await sha256(passwordInput.value);
      if(h===PASS_SHA256) unlock(false);
      else{
        wrongCount++;
        const msgs=['비밀번호가 올바르지 않습니다.','다시 확인해 주세요.','한 번 더 시도해 보세요.','invalid (do not give up)'];
        errorMessage.textContent=msgs[Math.min(wrongCount-1,msgs.length-1)];
        passwordInput.style.animation='shake .5s';
        setTimeout(()=>{passwordInput.style.animation='';passwordInput.value='';passwordInput.focus();},500);
      }
    }
    passwordInput.addEventListener('input',function(){if(this.value.length===4)checkPassword();});
    passwordInput.addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});


    const openWall=document.getElementById('openWall');
    const wallBackdrop=document.getElementById('wallBackdrop');
    const wallLinks=document.querySelectorAll('.project-links a');

    function setWall(open){
      document.body.classList.toggle('wall-open', open);
      if(openWall) openWall.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
    if(openWall) openWall.addEventListener('click',()=>setWall(!document.body.classList.contains('wall-open')));
    if(wallBackdrop) wallBackdrop.addEventListener('click',()=>setWall(false));
    wallLinks.forEach(a=>{
      if(a.pathname===location.pathname) a.classList.add('current');
      a.addEventListener('click',()=>setWall(false));
    });
    window.addEventListener('keydown',e=>{ if(e.key==='Escape') setWall(false); });

    if(sessionStorage.getItem(KEY)==='1') unlock(true);
    else passwordInput.focus();
  </script>
</body>
</html>
