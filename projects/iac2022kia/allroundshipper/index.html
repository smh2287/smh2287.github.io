<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLROUNDSHIPPER – Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fade-time: 1000ms;
            --accent: #1FFFE0;
            --bg: #1F2121;
            --text: #EBF2F4;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: #fff;
        }

        /* ═══════════════════════════════════════════
       PASSWORD SCREEN
    ═══════════════════════════════════════════ */
        #password-screen {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity var(--fade-time) ease-in-out;
        }

        #password-screen::before {
            content: '';
            position: absolute;
            inset: -40px;
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            filter: blur(24px);
            transform: scale(1.05);
            z-index: 0;
        }

        #password-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(20, 22, 22, 0.55);
            z-index: 1;
        }

        .password-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            width: 100%;
        }

        .pre-title {
            color: var(--text);
            font-size: 17px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            min-height: 20px;
        }

        .kia-logo {
            height: 13px;
            width: auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
        }

        h1 b {
            font-weight: 700;
        }

        #password-input {
            width: 300px;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            background: var(--text);
            color: var(--bg);
            border-radius: 0;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 3px;
            font-family: 'Montserrat', sans-serif;
        }

        #password-input::placeholder {
            color: #1F2F21;
            opacity: 0.6;
        }

        #submit-btn {
            display: none;
        }

        #error-message {
            color: #ff6445;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-10px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(10px);
            }
        }

        /* ═══════════════════════════════════════════
       PORTFOLIO SCREEN
    ═══════════════════════════════════════════ */
        #portfolio-screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--fade-time) ease-in-out;
            z-index: 100;
            background: var(--bg);
        }

        #portfolio-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .swiper-slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            overflow: hidden;
        }

        .swiper-slide img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ═══════════════════════════════════════════
       SCROLL HINT
    ═══════════════════════════════════════════ */
        #scroll-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 300;
        }

        #scroll-hint.show {
            opacity: 1;
        }

        #scroll-hint.hide {
            opacity: 0;
        }

        .scroll-arrow {
            width: 20px;
            height: 20px;
            border-right: 2px solid var(--accent);
            border-bottom: 2px solid var(--accent);
            transform: rotate(45deg);
            animation: bounce 1.4s infinite;
        }

        .scroll-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 300;
            opacity: 0.8;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: rotate(45deg) translateY(0);
            }

            50% {
                transform: rotate(45deg) translateY(6px);
            }
        }
    
        #password-screen{display:none !important;}
    </style>
</head>

<body>
    <div id="password-screen">
        <div class="password-container">
            <div class="pre-title" id="pre-title-container"></div>
            <h1 id="page-title"></h1>
            <input type="password" id="password-input" placeholder="password" autocomplete="off" maxlength="4">
            <br>
            <button id="submit-btn">확인</button>
            <div id="error-message"></div>
        </div>
    </div>

    <div id="portfolio-screen" class="swiper">
        <div class="swiper-wrapper" id="swiper-wrapper"></div>
    </div>

    <div id="scroll-hint">
        <div class="scroll-arrow"></div>
        <div class="scroll-label">SCROLL</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js">

        sessionStorage.setItem('authed_allroundshipper', '1');

        const PAGE_TITLE = "<b>ALLROUND</b>SHIPPER";
        const CORRECT_PASSWORD = "2287";
        const BASE_IMG = 'https://songfamhome.synology.me/portfolio/images/iac2022kia/allroundshipper/';
        const IMAGES = ["01IAC22K-04AS-01 _ One-page_ allroundshipper.webp"];

        const FADE_TIME_MS = 1000;
        const POST_FADE_DELAY = 500;

        const imgURL = f => BASE_IMG + f.replace(/ /g, '%20');
        document.getElementById('password-screen').style.setProperty('--bg-img', `url('${imgURL(IMAGES[0])}')`);
        document.documentElement.style.setProperty('--fade-time', `${FADE_TIME_MS}ms`);

        const passwordInput = document.getElementById('password-input');
        const errorMessage = document.getElementById('error-message');
        const passwordScreen = document.getElementById('password-screen');
        const portfolioScreen = document.getElementById('portfolio-screen');
        const swiperWrapper = document.getElementById('swiper-wrapper');
        const preTitleContainer = document.getElementById('pre-title-container');
        const pageTitleEl = document.getElementById('page-title');
        const scrollHint = document.getElementById('scroll-hint');

        preTitleContainer.innerHTML = `<span>${PRE_TITLE_CONFIG.text}</span><img src="${PRE_TITLE_CONFIG.logoSrc}" alt="Kia Logo" class="kia-logo">`;
        pageTitleEl.innerHTML = PAGE_TITLE;
        document.title = pageTitleEl.innerText + ' – Portfolio';

        IMAGES.forEach((imgSrc, idx) => {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            const zoomWrap = document.createElement('div');
            zoomWrap.className = 'swiper-zoom-container';
            const img = document.createElement('img');
            img.src = imgURL(imgSrc);
            img.alt = `AllroundShipper – slide ${idx + 1}`;
            zoomWrap.appendChild(img);
            slide.appendChild(zoomWrap);
            swiperWrapper.appendChild(slide);
        });

        const swiper = new Swiper('.swiper', {
            direction: 'vertical',
            slidesPerView: 1,
            mousewheel: true,
            zoom: { maxRatio: 3, toggle: false },
            on: {
                slideChange: () => scrollHint.classList.add('hide'),
                zoomChange: (swiper, scale) => {
                    if (scale <= 1.05) setTimeout(() => { if (swiper.zoom.scale <= 1.05) swiper.zoom.out(); }, 50);
                }
            }
        });

        function unlockPortfolio(isInstant = false) {
            sessionStorage.setItem('authed_allroundshipper', '1');
            if (isInstant) {
                passwordScreen.style.display = 'none';
                portfolioScreen.classList.add('visible');
            } else {
                passwordScreen.style.opacity = '0';
                setTimeout(() => {
                    passwordScreen.style.display = 'none';
                    portfolioScreen.classList.add('visible');
                    if (IMAGES.length > 1) {
                        scrollHint.classList.add('show');
                        setTimeout(() => scrollHint.classList.add('hide'), 2800);
                    }
                }, FADE_TIME_MS + POST_FADE_DELAY);
            }
        }

        passwordInput.addEventListener('input', function () {
            if (this.value.length === 4) {
                if (this.value === CORRECT_PASSWORD) unlockPortfolio(false);
                else {
                    errorMessage.textContent = 'invalid';
                    passwordInput.style.animation = 'shake 0.5s';
                    setTimeout(() => { passwordInput.style.animation = ''; passwordInput.value = ''; }, 500);
                }
            }
        });

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('authed_allroundshipper') === '1') unlockPortfolio(true);
            else passwordInput.focus();
        });
    </script>
</body>

</html>
