<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENVIRONMENTS – Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fade-time: 1000ms;
            --accent: #1FFFE0;
            --bg: #1F2121;
            --text: #EBF2F4;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: #fff;
        }

        #password-screen {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity var(--fade-time) ease-in-out;
        }

        #password-screen::before {
            content: '';
            position: absolute;
            inset: -40px;
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            filter: blur(24px);
            transform: scale(1.05);
            z-index: 0;
        }

        #password-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(20, 22, 22, 0.55);
            z-index: 1;
        }

        .password-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            width: 100%;
        }

        .pre-title {
            color: var(--text);
            font-size: 17px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            min-height: 20px;
        }

        .kia-logo {
            height: 13px;
            width: auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
        }

        h1 b {
            font-weight: 700;
        }

        #password-input {
            width: 300px;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            background: var(--text);
            color: var(--bg);
            text-align: center;
            letter-spacing: 3px;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }

        #error-message {
            color: #ff6445;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-10px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(10px);
            }
        }

        #portfolio-screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--fade-time) ease-in-out;
            z-index: 100;
            background: var(--bg);
        }

        #portfolio-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .swiper-slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            overflow: hidden;
        }

        .swiper-slide img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .slide-video {
            background: #000;
            position: relative;
        }

        .video-cover {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.4s;
        }

        .play-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 80px 0 80px 138px;
            border-color: transparent transparent transparent #EBF2F4;
        }

        .play-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            color: #EBF2F4;
        }

        .video-iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1;
        }

        .video-iframe.active {
            opacity: 1;
            pointer-events: auto;
        }

        .swipe-overlay {
            position: absolute;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 5;
            top: 0;
        }

        #scroll-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 300;
        }

        #scroll-hint.show {
            opacity: 1;
        }

        #scroll-hint.hide {
            opacity: 0;
        }

        .scroll-arrow {
            width: 20px;
            height: 20px;
            border-right: 2px solid var(--accent);
            border-bottom: 2px solid var(--accent);
            transform: rotate(45deg);
            animation: bounce 1.4s infinite;
        }

        .scroll-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 300;
            opacity: 0.8;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: rotate(45deg) translateY(0);
            }

            50% {
                transform: rotate(45deg) translateY(6px);
            }
        }
    
        
    
        
    
        #password-screen{display:none !important;}
    </style>
</head>

<body>
    <div id="password-screen">
        <div class="password-container">
            <div class="pre-title" id="pre-title-container"></div>
            <h1 id="page-title"></h1>
            <input type="password" id="password-input" placeholder="password" autocomplete="off" maxlength="4">
            <br>
            <div id="error-message"></div>
        </div>
    </div>

    <div id="portfolio-screen" class="swiper">
        <div class="swiper-wrapper" id="swiper-wrapper"></div>
    </div>

    <div id="scroll-hint">
        <div class="scroll-arrow"></div>
        <div class="scroll-label">SCROLL</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js">
        const __pf = document.getElementById('portfolio-screen');
        if (__pf) { __pf.classList.add('visible'); }


        // auto-open without per-project password
        setTimeout(() => {
            try {
                if (typeof unlockPortfolio === 'function') {
                    unlockPortfolio(true);
                } else {
                    const __ps = document.getElementById('password-screen');
                    if (__ps) __ps.style.display = 'none';
                    const __pf = document.getElementById('portfolio-screen');
                    if (__pf) __pf.classList.add('visible');
                }
            } catch(e) {}
        }, 0);

</script>

        const FADE_TIME_MS = 1000, POST_FADE_DELAY = 500;
        const imgURL = f => BASE_IMG + f.replace(/ /g, '%20');
        document.getElementById('password-screen').style.setProperty('--bg-img', `url('${imgURL(IMAGES[0])}')`);
        document.documentElement.style.setProperty('--fade-time', `${FADE_TIME_MS}ms`);

        const swiperWrapper = document.getElementById('swiper-wrapper');
        IMAGES.forEach((imgSrc, idx) => {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            const zoomWrap = document.createElement('div');
            zoomWrap.className = 'swiper-zoom-container';
            const img = document.createElement('img');
            img.src = imgURL(imgSrc);
            img.alt = `Environments – slide ${idx + 1}`;
            zoomWrap.appendChild(img);
            slide.appendChild(zoomWrap);
            swiperWrapper.appendChild(slide);
        });

        let videoIframe = null;
        if (YOUTUBE_VIDEO_ID) {
            const vSlide = document.createElement('div');
            vSlide.className = 'swiper-slide slide-video';
            vSlide.innerHTML = `<div class="video-cover" onclick=""><div class="play-group"><div class="play-icon"></div><div class="play-text">press to play video</div></div></div><iframe class="video-iframe" allow="autoplay; fullscreen"></iframe><div class="swipe-overlay"></div>`;
            const cover = vSlide.querySelector('.video-cover');
            const iframe = vSlide.querySelector('.video-iframe');
            videoIframe = iframe;
            cover.addEventListener('click', () => {
                cover.style.opacity = '0'; cover.style.pointerEvents = 'none'; iframe.classList.add('active');
                iframe.src = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?controls=1&modestbranding=1&rel=0&enablejsapi=1&autoplay=1`;
            });
            swiperWrapper.appendChild(vSlide);
        }

        const swiper = new Swiper('.swiper', {
            direction: 'vertical', mousewheel: true, zoom: { maxRatio: 3, toggle: false },
            on: {
                slideChange: function () {
                    document.getElementById('scroll-hint').classList.add('hide');
                    if (videoIframe && videoIframe.src && this.activeIndex !== swiper.slides.length - 1) {
                        videoIframe.contentWindow?.postMessage('{"event":"command","func":"pauseVideo","args":[]}', '*');
                    }
                }
            }
        });

        function unlockPortfolio(isInstant = false) {
            sessionStorage.setItem('authed_environments', '1');
            const ps = document.getElementById('password-screen');
            if (isInstant) ps.style.display = 'none';
            else {
                ps.style.opacity = '0';
                setTimeout(() => { ps.style.display = 'none'; document.getElementById('portfolio-screen').classList.add('visible'); }, FADE_TIME_MS + POST_FADE_DELAY);
            }
            document.getElementById('portfolio-screen').classList.add('visible');
            if (!isInstant && IMAGES.length > 1) {
                const hint = document.getElementById('scroll-hint');
                hint.classList.add('show');
                setTimeout(() => hint.classList.add('hide'), 2800);
            }
        }

        document.getElementById('password-input').addEventListener('input', function () {
            if (this.value.length === 4) {
                if (this.value === CORRECT_PASSWORD) unlockPortfolio(false);
                else {
                    document.getElementById('error-message').textContent = 'invalid';
                    this.style.animation = 'shake 0.5s';
                    setTimeout(() => { this.style.animation = ''; this.value = ''; }, 500);
                }
            }
        });

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('authed_environments') === '1' || sessionStorage.getItem('authed_iac2022kia') === '1') { sessionStorage.setItem('authed_environments','1'); unlockPortfolio(true); }
            else document.getElementById('password-input').focus();
        });
