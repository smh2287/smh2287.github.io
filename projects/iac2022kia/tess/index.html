    <meta charset="UTF-8">

    <title>TESS – Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fade-time: 1000ms;
            --accent: #1FFFE0;
            --bg: #1F2121;
            --text: #EBF2F4;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: #fff;
        }

        #password-screen {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity var(--fade-time) ease-in-out;
        }

        #password-screen::before {
            content: '';
            position: absolute;
            inset: -40px;
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            filter: blur(24px);
            transform: scale(1.05);
            z-index: 0;
        }

        #password-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(20, 22, 22, 0.55);
            z-index: 1;
        }

        .password-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            width: 100%;
        }

        .pre-title {
            color: var(--text);
            font-size: 17px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            min-height: 20px;
        }

        .kia-logo {
            height: 13px;
            width: auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
        }

        h1 b {
            font-weight: 700;
        }

        #password-input {
            width: 300px;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            background: var(--text);
            color: var(--bg);
            text-align: center;
            letter-spacing: 3px;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }

        #error-message {
            color: #ff6445;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        #portfolio-screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--fade-time) ease-in-out;
            z-index: 100;
            background: var(--bg);
        }

        #portfolio-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .swiper-slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            overflow: hidden;
        }

        .swiper-slide img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .slide-video {
            background: #000;
            position: relative;
        }

        .video-cover {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.4s;
        }

        .play-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 80px 0 80px 138px;
            border-color: transparent transparent transparent #EBF2F4;
        }

        .play-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            color: #EBF2F4;
        }

        .video-iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1;
        }

        .video-iframe.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const PAGE_TITLE = "<b>TESS</b>";
        const CORRECT_PASSWORD = "2287";
        const BASE_IMG = '/assets/images/iac2022kia/tess/';
        const IMAGES = ["01IAC22K-05TS-01 _ One-page_ tess.webp"];
        const YOUTUBE_VIDEO_ID = "v0Ixj1aVosY";
        const FADE_TIME_MS = 1000, POST_FADE_DELAY = 500;
        const imgURL = f => BASE_IMG + f.replace(/ /g, '%20');
        document.getElementById('password-screen').style.setProperty('--bg-img', `url('${imgURL(IMAGES[0])}')`);
        const swiperWrapper = document.getElementById('swiper-wrapper');
        IMAGES.forEach((imgSrc, idx) => {
            const slide = document.createElement('div'); slide.className = 'swiper-slide';
            slide.innerHTML = `<div class="swiper-zoom-container"><img src="${imgURL(imgSrc)}" alt="Slide ${idx + 1}"></div>`;
            swiperWrapper.appendChild(slide);
        });
        let videoIframe = null;
        if (YOUTUBE_VIDEO_ID) {
            const vSlide = document.createElement('div'); vSlide.className = 'swiper-slide slide-video';
            vSlide.innerHTML = `<div class="video-cover" onclick=""><div class="play-group"><div class="play-icon"></div><div class="play-text">press to play video</div></div></div><iframe class="video-iframe" allow="autoplay; fullscreen"></iframe>`;
            const cover = vSlide.querySelector('.video-cover'), iframe = vSlide.querySelector('.video-iframe');
            videoIframe = iframe;
            cover.addEventListener('click', () => { cover.style.opacity = '0'; cover.style.pointerEvents = 'none'; iframe.classList.add('active'); iframe.src = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?controls=1&enablejsapi=1&autoplay=1`; });
            swiperWrapper.appendChild(vSlide);
        }
        const swiper = new Swiper('.swiper', { direction: 'vertical', mousewheel: true, zoom: { maxRatio: 3, toggle: false } });
        function unlockPortfolio(isInstant = false) {
            sessionStorage.setItem('authed_tess', '1');
            const ps = document.getElementById('password-screen');
            if (isInstant) ps.style.display = 'none';
            else { ps.style.opacity = '0'; setTimeout(() => ps.style.display = 'none', FADE_TIME_MS + POST_FADE_DELAY); }
            document.getElementById('portfolio-screen').classList.add('visible');
        }
        document.getElementById('password-input').addEventListener('input', function () {
            if (this.value.length === 4) {
                if (this.value === CORRECT_PASSWORD) unlockPortfolio(false);
                else { document.getElementById('error-message').textContent = 'invalid'; this.style.animation = 'shake 0.5s'; setTimeout(() => { this.style.animation = ''; this.value = ''; }, 500); }
            }
        });
        window.addEventListener('load', () => { if (sessionStorage.getItem('authed_tess') === '1') unlockPortfolio(true); else document.getElementById('password-input').focus(); });
    </script>
