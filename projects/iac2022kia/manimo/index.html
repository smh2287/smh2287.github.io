    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fade-time: 1000ms;
            --accent: #1FFFE0;
            --bg: #1F2121;
            --text: #EBF2F4;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: #fff;
        }

        #password-screen {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity var(--fade-time) ease-in-out;
        }

        #password-screen::before {
            content: '';
            position: absolute;
            inset: -40px;
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            filter: blur(24px);
            transform: scale(1.05);
            z-index: 0;
        }

        #password-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(20, 22, 22, 0.55);
            z-index: 1;
        }

        .password-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            width: 100%;
        }

        .pre-title {
            color: var(--text);
            font-size: 17px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            min-height: 20px;
        }

        .kia-logo {
            height: 13px;
            width: auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
        }

        h1 b {
            font-weight: 700;
        }

        #password-input {
            width: 300px;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            background: var(--text);
            color: var(--bg);
            text-align: center;
            letter-spacing: 3px;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }

        #error-message {
            color: #ff6445;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        #portfolio-screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--fade-time) ease-in-out;
            z-index: 100;
            background: var(--bg);
        }

        #portfolio-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .swiper-slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            overflow: hidden;
        }

        .swiper-slide img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }
    
        
    
        
    
        #password-screen{display:none !important;}
    </style>

    <script>
        const PAGE_TITLE = "<b>MANI</b>MO";

        const BASE_IMG = 'https://songfamhome.synology.me/portfolio/images/iac2022kia/manimo/';
        const IMAGES = ["01IAC22K-07MN-01 _ One-page_ manimo.webp"];
        const FADE_TIME_MS = 1000, POST_FADE_DELAY = 500;
        const imgURL = f => BASE_IMG + f.replace(/ /g, '%20');
        document.getElementById('password-screen').style.setProperty('--bg-img', `url('${imgURL(IMAGES[0])}')`);
        const swiperWrapper = document.getElementById('swiper-wrapper');
        IMAGES.forEach((imgSrc, idx) => {
            const slide = document.createElement('div'); slide.className = 'swiper-slide';
            slide.innerHTML = `<div class="swiper-zoom-container"><img src="${imgURL(imgSrc)}" alt="Slide ${idx + 1}"></div>`;
            swiperWrapper.appendChild(slide);
        });
        const swiper = new Swiper('.swiper', { direction: 'vertical', mousewheel: true, zoom: { maxRatio: 3, toggle: false } });
        function unlockPortfolio(isInstant = false) {
            sessionStorage.setItem('authed_manimo', '1');
            const ps = document.getElementById('password-screen');
            if (isInstant) ps.style.display = 'none';
            else { ps.style.opacity = '0'; setTimeout(() => ps.style.display = 'none', FADE_TIME_MS + POST_FADE_DELAY); }
            document.getElementById('portfolio-screen').classList.add('visible');
        }
        document.getElementById('password-input').addEventListener('input', function () {
            if (this.value.length === 4) {
                if (this.value === CORRECT_PASSWORD) unlockPortfolio(false);
                else { document.getElementById('error-message').textContent = 'invalid'; this.style.animation = 'shake 0.5s'; setTimeout(() => { this.style.animation = ''; this.value = ''; }, 500); }
            }
        });
        window.addEventListener('load', () => { if (sessionStorage.getItem('authed_manimo') === '1' || sessionStorage.getItem('authed_iac2022kia') === '1') { sessionStorage.setItem('authed_manimo','1'); unlockPortfolio(true); } else document.getElementById('password-input').focus(); });
    </script>

<script id="hara-detail-nav-js">
(() => {
  const openWall=document.getElementById('openWall');
  const wallBackdrop=document.getElementById('wallBackdrop');
  const projectsToggle=document.getElementById('projectsToggle');
  const projectsSub=document.getElementById('projectsSub');
  const projectLinks=[...document.querySelectorAll('.project-links a')];
  const homeLink=document.getElementById('homeLink');

  function normalize(path){ return (path || '').replace(/index\.html$/, '').replace(/\/$/, '') || '/'; }
  function setProjects(open){
    if(!projectsToggle || !projectsSub) return;
    projectsToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    projectsSub.classList.toggle('open', open);
  }
  function setWall(open){
    document.body.classList.toggle('wall-open', open);
    if(openWall) openWall.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  const current = normalize(location.pathname);
  if(homeLink && current === '/') homeLink.classList.add('current');
  projectLinks.forEach(a => {
    const href = normalize(new URL(a.getAttribute('href'), location.origin).pathname);
    if(current === href || (href !== '/' && current.startsWith(href + '/'))){
      a.classList.add('current');
      setProjects(true);
    }
    a.addEventListener('click', ()=>setWall(false));
  });

  if(openWall) openWall.addEventListener('click', ()=>setWall(!document.body.classList.contains('wall-open')));
  if(wallBackdrop) wallBackdrop.addEventListener('click', ()=>setWall(false));
  if(projectsToggle) projectsToggle.addEventListener('click', ()=>setProjects(projectsToggle.getAttribute('aria-expanded') !== 'true'));
  window.addEventListener('keydown', e => { if(e.key === 'Escape') setWall(false); });
})();
</script>
