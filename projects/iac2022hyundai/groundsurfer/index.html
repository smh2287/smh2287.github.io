<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GROUNDSURFER – Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>
*{{margin:0;padding:0;box-sizing:border-box}}:root{{--bg:#1F2121;--text:#EBF2F4;--accent:#1FFFE0}}
html,body{{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif}}
#portfolio-screen{{position:fixed;inset:0;width:100%;height:100%;background:var(--bg)}}
.swiper,.swiper-wrapper,.swiper-slide{{width:100%;height:100%}}
.swiper-slide{{display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden}}
.swiper-slide img{{width:100%;height:auto;display:block;pointer-events:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-user-drag:none}}
.swiper-button-prev,.swiper-button-next{{color:#fff;opacity:.65}} .swiper-pagination-bullet{{background:#ddd}} .swiper-pagination-bullet-active{{background:var(--accent)}}
.topbar{{position:fixed;top:12px;left:14px;z-index:50;font-size:12px;letter-spacing:2px;opacity:.72}}
</style></head>
<body>
<div class="topbar">GROUNDSURFER</div>
<div id="portfolio-screen"><div class="swiper" id="portfolio-swiper"><div class="swiper-wrapper">
<section class='swiper-slide'><img src='https://songfamhome.synology.me/portfolio/images/iac2022hyundai/groundsurfer/02IAC22H-06GS-01%20_%20One-page_%20ground%20surfer.webp' alt='slide'></section>
</div><div class="swiper-button-prev"></div><div class="swiper-button-next"></div><div class="swiper-pagination"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
new Swiper('#portfolio-swiper',{{direction:'vertical',slidesPerView:1,speed:650,mousewheel:true,keyboard:{{enabled:true}},pagination:{{el:'.swiper-pagination',clickable:true}},navigation:{{nextEl:'.swiper-button-next',prevEl:'.swiper-button-prev'}}}});
</script></body></html>
