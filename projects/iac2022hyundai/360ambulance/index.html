<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>360AMBULANCE – Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>*{{margin:0;padding:0;box-sizing:border-box}}:root{{--bg:#1F2121;--text:#EBF2F4;--accent:#1FFFE0;--fade-time:1000ms}}html,body{{width:100%;height:100%;overflow:hidden;font-family:'Montserrat',sans-serif;background:var(--bg);color:#fff}}#password-screen{{display:none!important}}#portfolio-screen{{position:fixed;inset:0;width:100%;height:100%;opacity:1;pointer-events:auto;background:var(--bg)}}.swiper-slide{{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden}}.swiper-slide img{{max-width:100%;max-height:100%;width:auto;height:auto;display:block;pointer-events:none;-webkit-user-select:none;user-select:none;object-fit:contain}}#scroll-hint{{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:.7;pointer-events:none;z-index:300}}.scroll-arrow{{width:20px;height:20px;border-right:2px solid var(--accent);border-bottom:2px solid var(--accent);transform:rotate(45deg);animation:bounce 1.4s infinite}}.scroll-label{{font-size:10px;letter-spacing:2px;color:var(--accent);font-weight:300}}@keyframes bounce{{0%,100%{{transform:rotate(45deg) translateY(0)}}50%{{transform:rotate(45deg) translateY(6px)}}}}</style></head>
<body><div id="portfolio-screen" class="swiper"><div class="swiper-wrapper" id="swiper-wrapper"></div></div><div id="scroll-hint"><div class="scroll-arrow"></div><div class="scroll-label">SCROLL</div></div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script><script>
const BASE_IMG='https://songfamhome.synology.me/portfolio/images/iac2022hyundai/360ambulance/';
const IMAGES=["02IAC22H-09AM-01 _ One-page_ 360 ambulance.webp"];
const imgURL=f=>BASE_IMG+encodeURIComponent(f).replace(/%2F/g,'/');
const wrap=document.getElementById('swiper-wrapper');
IMAGES.forEach((f,idx)=>{{const s=document.createElement('div');s.className='swiper-slide';s.innerHTML=`<img src="${{imgURL(f)}}" alt="slide ${{idx+1}}">`;wrap.appendChild(s);}});
new Swiper('.swiper',{{direction:'vertical',mousewheel:true,keyboard:{{enabled:true}},speed:620}});
if(IMAGES.length<=1) document.getElementById('scroll-hint').style.display='none';
</script></body></html>
