<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #1F2121;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      transition: background-color var(--fade-time, 0.5s) ease-in-out;
    }

    #password-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: opacity var(--fade-time, 0.5s) ease-in-out;
    }

    .password-container {
      width: 100%;
      text-align: center;
      padding: 40px;
    }

    .pre-title {
      color: #EBF2F4;
      font-size: 17px;
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      min-height: 20px;
    }

    .pre-title span {
      font-weight: 700;
    }

    .kia-logo {
      height: 13px;
      width: auto;
    }

    .hyundai-logo {
      height: 18px;
      width: auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      font-weight: 300;
      letter-spacing: 2px;
      color: #1FFFE0;
    }

    h1 b {
      font-weight: 700;
    }

    #password-input {
      width: 300px;
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      background: #EBF2F4;
      color: #1F2121;
      border-radius: 0;
      outline: none;
      transition: all 0.3s;
      text-align: center;
      letter-spacing: 3px;
      font-family: 'Montserrat', sans-serif;
    }

    #password-input::placeholder {
      color: #1F2F21;
      opacity: 0.6;
    }

    #submit-btn {
      display: none;
    }

    #error-message {
      color: #ff6445;
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }

    .credits {
      margin-top: 50px;
      font-size: 11px;
      color: #EBF2F4;
      opacity: 0.6;
      line-height: 1.8;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .credits strong {
      font-weight: 700;
      color: #fff;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .credits span {
      display: block;
    }

    #video-screen {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    #video-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      10%,
      30%,
      50%,
      70%,
      90% {
        transform: translateX(-10px);
      }

      20%,
      40%,
      60%,
      80% {
        transform: translateX(10px);
      }
    }

    @media (max-width: 768px) {
      #password-screen {
        justify-content: flex-start;
        padding-top: 60px;
      }
    }
  </style>
</head>

<body>

    <div class="password-container">
      <div class="pre-title" id="pre-title-container"></div>

      <h1 id="page-title"></h1>
      <input type="password" id="password-input" placeholder="password" autocomplete="off" maxlength="4">
      <br>
      <button id="submit-btn">확인</button>
      <div id="error-message"></div>

      <div class="credits">
        <strong>Designer</strong>

        <strong>Visualizer</strong>
        <span>saehyeon park (saehyeone@gmail.com)</span>
        <span>minho song (songminh0442@gmail.com)</span>

        <strong>My Part</strong>
        <span>optimization / still(rework) / xr</span>
      </div>
    </div>
  </div>

    <iframe id="youtube-player" src=""

  </div>

    document.documentElement.style.setProperty('--fade-time', `${FADE_TIME_MS}ms`);

    const passwordInput = document.getElementById('password-input');
    const errorMessage = document.getElementById('error-message');
    const passwordScreen = document.getElementById('password-screen');
    const videoScreen = document.getElementById('video-screen');
    const youtubePlayer = document.getElementById('youtube-player');
    const pageTitleElement = document.getElementById('page-title');
    const preTitleContainer = document.getElementById('pre-title-container');

    // ADDED: Counter for wrong password attempts
    let wrongAttemptCount = 0;

    // Setup page content from the settings
    let preTitleHTML = '';
    if (PRE_TITLE_CONFIG.text) {
      preTitleHTML += `<span>${PRE_TITLE_CONFIG.text}</span>`;
    }
    if (PRE_TITLE_CONFIG.logoSrc) {
      preTitleHTML += `<img src="${PRE_TITLE_CONFIG.logoSrc}" alt="Kia Logo" class="kia-logo">`;
    }
    preTitleContainer.innerHTML = preTitleHTML;

    pageTitleElement.innerHTML = PAGE_TITLE;
    document.title = pageTitleElement.innerText;

    function checkPassword() {
      const inputPassword = passwordInput.value;
      if (inputPassword === CORRECT_PASSWORD) {

        document.body.style.backgroundColor = '#000000';
        passwordScreen.style.opacity = '0';

        const totalDelay = FADE_TIME_MS + POST_FADE_DELAY_MS;
        setTimeout(() => {
          passwordScreen.style.display = 'none';
          videoScreen.style.display = 'block';
          youtubePlayer.src = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?autoplay=1&controls=1&modestbranding=1&rel=0&fs=1`;
        }, totalDelay);

      } else {
        // MODIFIED: Logic for multi-stage error messages
        wrongAttemptCount++;
        let message = '';

        switch (wrongAttemptCount) {
          case 1:
            message = 'invalid (3 remaining)';
            break;
          case 2:
            message = 'invalid (2 remaining)';
            break;
          case 3:
            message = 'invalid (1 remaining before video deletion)';
            break;
          case 4:
            message = 'invalid (video deleted)';
            break;
          case 5:
            message = 'invalid (I was joking)';
            break;
          default:
            message = 'invalid (do not give up)';
            break;
        }

        errorMessage.textContent = message;
        passwordInput.style.animation = 'shake 0.5s';
        setTimeout(() => {
          passwordInput.style.animation = '';
          passwordInput.value = '';
        }, 500);
      }
    }

    passwordInput.addEventListener('input', function () {
      errorMessage.textContent = '';
      if (this.value.length === 4) {
        checkPassword();
      }
    });

    
window.addEventListener('load', function () {
  try {
    if (passwordScreen) passwordScreen.style.display = 'none';
    if (videoScreen) videoScreen.style.display = 'block';
    if (typeof YOUTUBE_VIDEO_ID !== 'undefined' && youtubePlayer) {
      youtubePlayer.src = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?autoplay=0&controls=1&modestbranding=1&rel=0&fs=1`;
    }
  } catch(e) {}
});

  </script>
</body>
