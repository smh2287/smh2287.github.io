<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>G1 – Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#1F1F21;--text:#EBF2F4;--accent:#1FFFE0}html,body{width:100%;height:100%;overflow:hidden;font-family:'Montserrat',sans-serif;background:var(--bg);color:#fff}#portfolio-screen{position:fixed;inset:0;width:100%;height:100%;background:var(--bg)}.swiper-slide{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden}.swiper-zoom-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center}.swiper-slide img{max-width:100%;max-height:100%;width:auto;height:auto;display:block;pointer-events:none;-webkit-user-select:none;user-select:none;object-fit:contain}.slide-video{background:#000;position:relative}.video-cover{position:absolute;inset:0;z-index:10;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .35s}.play-group{display:flex;flex-direction:column;align-items:flex-start;gap:14px}.play-icon{width:0;height:0;border-style:solid;border-width:80px 0 80px 138px;border-color:transparent transparent transparent #EBF2F4}.play-text{font-size:14px;color:#EBF2F4}.video-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;opacity:0;pointer-events:none;transition:opacity .35s;z-index:1}.video-iframe.active{opacity:1;pointer-events:auto}#scroll-hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:.7;pointer-events:none;z-index:300}.scroll-arrow{width:20px;height:20px;border-right:2px solid var(--accent);border-bottom:2px solid var(--accent);transform:rotate(45deg);animation:bounce 1.4s infinite}.scroll-label{font-size:10px;letter-spacing:2px;color:var(--accent);font-weight:300}@keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(6px)}}</style>
<style id="hara-detail-nav">
.top-left{position:fixed;left:20px;top:20px;z-index:10010;transition:opacity .22s ease}
.menu-btn{width:42px;height:42px;border:1px solid rgba(255,255,255,.12);background:rgba(18,20,22,.7);color:#fff;display:grid;place-items:center;cursor:pointer}
.menu-btn:hover{border-color:#1FFFE0}
.hamburger{width:18px;height:14px;position:relative}
.hamburger i{position:absolute;left:0;right:0;height:2px;background:#fff}.hamburger i:nth-child(1){top:0}.hamburger i:nth-child(2){top:6px}.hamburger i:nth-child(3){top:12px}
.wall-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.42);opacity:0;pointer-events:none;transition:.28s;z-index:10020}
.wall{position:fixed;left:0;top:0;bottom:0;width:min(420px,88vw);background:#16191c;border-right:1px solid rgba(255,255,255,.12);transform:translateX(-102%);transition:.32s;z-index:10030;padding:26px 22px;overflow:auto}
body.wall-open .wall{transform:translateX(0)}
body.wall-open .wall{transform:translateX(0)}
body.wall-open .wall-backdrop{opacity:1;pointer-events:auto}
body.wall-open .top-left{opacity:0;pointer-events:none}
.wall-nav{display:flex;flex-direction:column}
.menu-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px 0;border:none;border-bottom:1px dashed rgba(255,255,255,.26);background:none;color:#e8eff1;text-decoration:none;font-size:15px;letter-spacing:.8px;text-align:left;cursor:pointer}
.menu-item:hover,.menu-item.current{color:#fff}
.accordion-toggle{font-family:inherit}
.chev{width:14px;height:14px;border-right:2px solid rgba(255,255,255,.85);border-bottom:2px solid rgba(255,255,255,.85);transform:rotate(45deg) translateY(-2px);transition:transform .25s ease, opacity .25s ease;opacity:.9;margin-right:4px}
.accordion-toggle[aria-expanded="true"] .chev{transform:rotate(225deg) translateY(-1px)}
.menu-sub{display:flex;flex-direction:column;gap:0;max-height:0;overflow:hidden;opacity:0;transition:max-height .32s ease, opacity .22s ease, margin .22s ease;margin:0}
.menu-sub.open{max-height:420px;opacity:1;margin:8px 0 10px}
.project-links a,.contact-links a{display:block;text-decoration:none;color:#bfc8cc;padding:10px 0 10px 18px;font-size:13px;letter-spacing:.45px;background:transparent;border:none;position:relative}
.project-links a::before,.contact-links a::before{content:'';position:absolute;left:0;top:50%;width:10px;border-top:1px solid rgba(255,255,255,.28);transform:translateY(-50%)}
.project-links a:hover,.project-links a.current,.contact-links a:hover,.contact-links a.current{color:#1FFFE0}
@media (max-width:640px){.top-left{left:14px;top:14px}.wall{width:min(360px,88vw);padding:22px 18px}.menu-item{padding:14px 0;font-size:14px}.project-links a{padding:8px 0 8px 16px;font-size:12px}}
</style>

</head>
<body>
<div class="top-left">
  <button class="menu-btn" id="openWall" aria-label="open menu" aria-expanded="false" type="button">
    <span class="hamburger"><i></i><i></i><i></i></span>
  </button>
</div>
<div class="wall-backdrop" id="wallBackdrop"></div>
<aside class="wall" id="wall">
  <nav class="wall-nav">
    <a class="menu-item top-link" id="homeLink" href="/">HOME</a>
    <button class="menu-item accordion-toggle" id="projectsToggle" aria-expanded="false" type="button">
      <span>PROJECTS</span><span class="chev"></span>
    </button>
    <div class="menu menu-sub project-links" id="projectsSub">
      <a href="/projects/iac2022kia/index.html">KIA X K'arts _ IAC 2022</a>
      <a href="/projects/iac2022hyundai/index.html">HYUNDAI X K'arts _ IAC 2022</a>
      <a href="/projects/iac2021kia/index.html">KIA X K'arts _ IAC 2021</a>
      <a href="/projects/vishow/index.html">VISHOW</a>
      <a href="/projects/niva/index.html">NIVA</a>
    </div>
      <a class="menu-item top-link" href="/contact/">CONTACT</a>
  </nav>
</aside>
<div id="portfolio-screen" class="swiper"><div class="swiper-wrapper" id="swiper-wrapper"></div></div><div id="scroll-hint"><div class="scroll-arrow"></div><div class="scroll-label">SCROLL</div></div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script><script>
const BASE_IMG='https://songfamhome.synology.me/portfolio/images/iac2021kia/g1/';
const IMAGES=["03IAC21K-02G1-01 _ G1 (one-page).webp"];
const YOUTUBE_VIDEO_ID="_LbWhILFwxU";
const imgURL=f=>BASE_IMG+encodeURIComponent(f).replace(/%2F/g,'/');
const wrap=document.getElementById('swiper-wrapper');
IMAGES.forEach((f,idx)=>{const s=document.createElement('div');s.className='swiper-slide';s.innerHTML=`<div class="swiper-zoom-container"><img src="${imgURL(f)}" alt="slide ${idx+1}"></div>`;wrap.appendChild(s);});
let videoIframe=null;
if(YOUTUBE_VIDEO_ID){const v=document.createElement('div');v.className='swiper-slide slide-video';v.innerHTML=`<div class="video-cover"><div class="play-group"><div class="play-icon"></div><div class="play-text">press to play video</div></div></div><iframe class="video-iframe" allow="autoplay; fullscreen"></iframe>`;const cover=v.querySelector('.video-cover');const iframe=v.querySelector('.video-iframe');videoIframe=iframe;cover.addEventListener('click',()=>{cover.style.opacity='0';cover.style.pointerEvents='none';iframe.classList.add('active');iframe.src=`https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?controls=1&enablejsapi=1&autoplay=1`;});wrap.appendChild(v);}
const swiper=new Swiper('.swiper',{direction:'vertical',mousewheel:true,keyboard:{enabled:true},zoom:{maxRatio:3,toggle:false},speed:620,on:{slideChange:function(){if(videoIframe&&videoIframe.src&&this.activeIndex!==swiper.slides.length-1){videoIframe.contentWindow?.postMessage('{"event":"command","func":"pauseVideo","args":[]}','*');}}}});
if(IMAGES.length<=1&&!YOUTUBE_VIDEO_ID) document.getElementById('scroll-hint').style.display='none';
</script>
<script id="hara-detail-nav-js">
(() => {
  const openWall=document.getElementById('openWall');
  const wallBackdrop=document.getElementById('wallBackdrop');
  const projectsToggle=document.getElementById('projectsToggle');
  const projectsSub=document.getElementById('projectsSub');
  const projectLinks=[...document.querySelectorAll('.project-links a')];
  const homeLink=document.getElementById('homeLink');

  function normalize(path){ return (path || '').replace(/index\.html$/, '').replace(/\/$/, '') || '/'; }
  function setProjects(open){
    if(!projectsToggle || !projectsSub) return;
    projectsToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    projectsSub.classList.toggle('open', open);
  }
  function setWall(open){
    document.body.classList.toggle('wall-open', open);
    if(openWall) openWall.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  const current = normalize(location.pathname);
  if(homeLink && current === '/') homeLink.classList.add('current');
  projectLinks.forEach(a => {
    const href = normalize(new URL(a.getAttribute('href'), location.origin).pathname);
    if(current === href || (href !== '/' && current.startsWith(href + '/'))){
      a.classList.add('current');
      setProjects(true);
    }
    a.addEventListener('click', ()=>setWall(false));
  });

  if(openWall) openWall.addEventListener('click', ()=>setWall(!document.body.classList.contains('wall-open')));
  if(wallBackdrop) wallBackdrop.addEventListener('click', ()=>setWall(false));
  if(projectsToggle) projectsToggle.addEventListener('click', ()=>setProjects(projectsToggle.getAttribute('aria-expanded') !== 'true'));
  window.addEventListener('keydown', e => { if(e.key === 'Escape') setWall(false); });
})();
</script>

</body></html>
