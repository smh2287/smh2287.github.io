<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>V2 – Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#1F2121;--text:#EBF2F4;--accent:#1FFFE0}html,body{width:100%;height:100%;overflow:hidden;font-family:'Montserrat',sans-serif;background:var(--bg);color:#fff}#portfolio-screen{position:fixed;inset:0;width:100%;height:100%;background:var(--bg)}.swiper-slide{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden}.swiper-zoom-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center}.swiper-slide img{max-width:100%;max-height:100%;width:auto;height:auto;display:block;pointer-events:none;-webkit-user-select:none;user-select:none;object-fit:contain}.slide-video{background:#000;position:relative}.video-cover{position:absolute;inset:0;z-index:10;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .35s}.play-group{display:flex;flex-direction:column;align-items:flex-start;gap:14px}.play-icon{width:0;height:0;border-style:solid;border-width:80px 0 80px 138px;border-color:transparent transparent transparent #EBF2F4}.play-text{font-size:14px;color:#EBF2F4}.video-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;opacity:0;pointer-events:none;transition:opacity .35s;z-index:1}.video-iframe.active{opacity:1;pointer-events:auto}#scroll-hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:.7;pointer-events:none;z-index:300}.scroll-arrow{width:20px;height:20px;border-right:2px solid var(--accent);border-bottom:2px solid var(--accent);transform:rotate(45deg);animation:bounce 1.4s infinite}.scroll-label{font-size:10px;letter-spacing:2px;color:var(--accent);font-weight:300}@keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(6px)}}</style></head>
<body><div id="portfolio-screen" class="swiper"><div class="swiper-wrapper" id="swiper-wrapper"></div></div><div id="scroll-hint"><div class="scroll-arrow"></div><div class="scroll-label">SCROLL</div></div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script><script>
const BASE_IMG='https://songfamhome.synology.me/portfolio/images/iac2021kia/v2/';
const IMAGES=["03IAC21K-01V2-01 _ Title.webp", "03IAC21K-01V2-02 _ 설명.webp", "03IAC21K-01V2-03 _ Rigging & CMF.webp", "03IAC21K-01V2-04 _ Exterior still.webp", "03IAC21K-01V2-05 _ Interior still.webp", "03IAC21K-01V2-06 _ Env interior.webp", "03IAC21K-01V2-07 _ Env exterior.webp", "03IAC21K-01V2-08 _ Review.webp"];
const YOUTUBE_VIDEO_ID="C6R90SQGAC4";
const imgURL=f=>BASE_IMG+encodeURIComponent(f).replace(/%2F/g,'/');
const wrap=document.getElementById('swiper-wrapper');
IMAGES.forEach((f,idx)=>{const s=document.createElement('div');s.className='swiper-slide';s.innerHTML=`<div class="swiper-zoom-container"><img src="${imgURL(f)}" alt="slide ${idx+1}"></div>`;wrap.appendChild(s);});
let videoIframe=null;
if(YOUTUBE_VIDEO_ID){const v=document.createElement('div');v.className='swiper-slide slide-video';v.innerHTML=`<div class="video-cover"><div class="play-group"><div class="play-icon"></div><div class="play-text">press to play video</div></div></div><iframe class="video-iframe" allow="autoplay; fullscreen"></iframe>`;const cover=v.querySelector('.video-cover');const iframe=v.querySelector('.video-iframe');videoIframe=iframe;cover.addEventListener('click',()=>{cover.style.opacity='0';cover.style.pointerEvents='none';iframe.classList.add('active');iframe.src=`https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?controls=1&enablejsapi=1&autoplay=1`;});wrap.appendChild(v);}
const swiper=new Swiper('.swiper',{direction:'vertical',mousewheel:true,keyboard:{enabled:true},zoom:{maxRatio:3,toggle:false},speed:620,on:{slideChange:function(){if(videoIframe&&videoIframe.src&&this.activeIndex!==swiper.slides.length-1){videoIframe.contentWindow?.postMessage('{"event":"command","func":"pauseVideo","args":[]}','*');}}}});
if(IMAGES.length<=1&&!YOUTUBE_VIDEO_ID) document.getElementById('scroll-hint').style.display='none';
</script></body></html>
